body:
  text: 暑月傷熱途中大暑最堪憐急取車輪土五錢盞內澄清湯服盡身輕體健即安然傷寒咳嗽傷寒咳嗽夜無眠細碾明礬末一錢半夏橘皮姜共煮煎湯調下化黏涎魚臍瘡魚臍瘡毒為難治火內飛礬地上攤寒食麵糊才貼上生肌退腫即時安口瘡口瘡發作痛難言香麝銅青一處研干捻些兒頻摻上不逾時刻自安然産難婦人臨産十分難若得良方也不艱尋取路傍草鞋鼻燒灰酒下即時安婦人口乾婦人口舌並焦乾不治如何得暫安尋取黃雞肝一具燒灰調酒似靈丹眼中流淚迎風冷淚聽根原臘月尋桑不等閒若得梢頭不落葉煎湯頻洗自然安小便不快小便不快有何難不用庸醫說再三匾竹水煎連口咽方知此法不虛傳大便不快大便不快聽吾言腹滿如山起坐難用水來研麻子汁一時吃了自然安鼻中出血鼻中衄血湧如泉亂髮燒灰有甚難竹管吹將鼻內去時間恰似遇神仙牙疼牙疼齒痛不堪言得法猶如遇列仙大戟燒來疼處咬名方留下豈虛傳遠年咳嗽遠年咳嗽最難痊休要求人枉費錢但用款冬花作末燒香一吸便安然刺毒腫痛刺毒腫痛叫聲連無血無膿不得眠研爛松脂為細末帛封其上免災愆刀傷出血刀傷出血不能停下子秋蛾效最靈研碎燒灰傷處貼即時定止見安平小兒骨痛小兒骨痛不能言出血流膿實可憐尋取水蛇皮一個燒灰油拌貼疼邊水瀉曾聞水瀉有何方焦炒車前子最良細末一錢調米飲只消七劑即安康臁瘡裡外臁瘡久不痊令人行動痛如煎如君會取牛蹄甲油拌燒灰敷患邊痼冷人身痼冷夜無眠生用川烏細細研好醋拌調攤絹上貼於冷處暖如綿蠅子入腸忽遭蠅子入咽喉苦惱心腸吐不休尋取世間蝦蟆眼爛研咽下解君愁蚊蝨木鱉川芎二味均雄黃減半共調勻用蜜為丸燒一粒自然蚊蝨不相侵破傷風破傷風病莫遲延脫殼秋蟬三二錢緊了牙關難治矣燒灰酒下便安然急傷寒急傷寒氣聽人言此法誰知有聖傳半夏酒姜煎一處時間服了即安然蛇傷若人苦被毒蛇傷獨蒜原來力甚良切作片兒遮患處艾燒七炷便安康犬傷犬傷何必苦憂煎我有仙方只口傳刮取磚青和牛糞敷於傷處即時痊心頭疼心頭疼苦不堪當急看仙傳海上方匾竹水煎連口咽教人服已便安康龜病腹中龜病不能言肚裡生來硬似磚自死殭蠶白馬尿不過時刻軟如綿內瘴眼睛內瘴淚漣漣且莫將心苦自煎但取鯉魚用膽腦和調相拌貼安然骨頭疼骨頭打碎最艱難尋破山鞋莫等閒火里燒灰油和貼管教哭臉變歡顏湯火燒湯火澆燒不可當肉皮潰爛痛非常雞清好酒來淋洗信是神仙海上方咽喉咽喉閉塞不能言幸有硼砂可保全搗和鹽梅如棗大口中噙化即時寬胡臭身邊胡臭不能堪授汝良方用小便夜靜頻頻承熱洗子孫後世免流傳血痢要醫血痢莫遲延濕紙包鹽火內燃研碎分為三處用白調粥飲即時安自縊懸梁自縊聽根源急急扶來地上眠皂角細辛吹鼻內須臾魂魄自還元耳聾耳聾久矣不聞言那怕成災三五年鼠膽尋來傾耳內真如頃刻遇神仙小兒夜哭小兒夜哭最堪憐徹夜無眠苦逼煎牛甲末兒臍上貼清清悄悄自然安耳疼耳中疼痛似刀剜出血流膿久不幹鳩屎夜明吹入耳除膿消腫便安然牙疼一撮黑豆數枝蔥熟艾川椒共有功半碗水煎勤自漱牙疼立止顯神通赤鼻肺風赤鼻最難醫幸有良方好受持但用硫礬為細末和調茄汁最相宜重舌小兒重舌最難熬鏽鎖將來火內燒打落屑兒為細末水調吃下即時消陰脫子腸不收脫肛陰脫兩般憂尋取鯽魚只用頭火上燒乾為細末半搽半服自然收脫肛脫肛不止久難安真個仙方遇有緣尋取蜘蛛燒得爛抹於肛上應時痊乍寒乍熱乍寒乍熱卻淹延反覆猶如鬼祟纏道上喜蛛尋數個將來系在脈門邊咽喉咽喉急閉莫因循快取蘆都草的根好酒煎來三四滾竹筒灌入妙通神雙蛾牛膝生根取汁擂男左女右鼻中吹不怕雙蛾來勢急酒調一服自然回痢七個烏梅七個棗七個栗殼七寸草更加燈心共酒煎赤白痢疾登時好月水不通婦人月水不能通鼠糞燒灰立見功熱酒調時逢扁鵲只消一服顯神通乳少婦人乳少聽吾言只用穿山甲五錢研碎米泔連夜飲乳流恰似井中泉乳瘡奶瘡腫痛叫聲連焦炒芝麻細細研燈盞油調塗上面除膿消腫即時痊産多麝香肉桂及紅花冰水為丸共一家牛膝煎湯來送下斷胎絶産定無差來溺小便不禁有何難尋取天台烏藥研飯後服時宜米飲日須兩次每三錢骨鯁骨鯁難醫苦叫天金櫻根用醋來煎入喉切莫沾牙上骨出令人體自便胎前發瘧胎前發瘧苦難言寒熱交攻最可憐急取夜明三錢整空心茶服自安然血崩婦人崩漏血何多管仲還同米炒和每服兩錢酒醋下應知此證自消磨牙疳走馬牙疳齒動搖棗中包信火中燒更將黃柏同為末患處捻些立便消婦人五心熱五心發熱欲如何赤芍藥同水薄荷等分研細白湯下自爾清涼轉見多口瘡滿口生瘡痛可憐乾薑急取共黃連口中細嚼流涎出從此瘡災永不纏小兒吐瀉小兒吐瀉怎能安滑石硫黃一處研每服一錢飲調下方知妙藥屬神仙頭風痛頭風頭痛太陽間芎芷石膏三味全細末三錢茶送下當時吃了效無前耳聾耳聾終日不聞言細辛為末蠟熔丸入耳綿包如鼠糞始信卻災似解懸自汗自汗不止防風末浮麥煎湯服二錢不效還將牡蠣散二方經驗可流傳犬傷人遭犬咬痛堪憐去殼萆麻五十圓爛搗成膏傷處貼又方虎骨可同傳手足厥冷四肢厥冷腹中難熱水蘸來拍膝彎紫黑點兒針刺破去些惡血就安痊湯火燒湯火燒淋痛可憐楊梅皮末使油摶又將好酒調來洗目下應知即便安轉筋吐瀉轉筋吐瀉實難當艾葉木瓜煎冷湯急取食鹽安口內方才咽下即平康痹癖大人小兒患痹癖腸間一塊硬如磚搗將大蒜硝黃共敷貼患處軟如綿臁瘡黃柏相將輕粉末再加豬膽調膏藥敷貼仍將帛緊纏一旬再易瘡拈卻骨鯁骨鯁單方野苧根又方甘草對砂仁金鳳花實根並用三般治法盡通神催生黃葵子炒七十粒爛研酒服濟人急婦人産難即全生免得閣家共憂戚吹乳婦人吹乳最難當急用男梳百齒霜取下飯丸桐子大三丸酒下不成傷痔漏脫肛痔漏脫肛人受苦疼痛之時面如土急取川椒可二錢空心水送免悽楚吹乳婦人吹乳意如何皂角燒灰蛤粉和好酒將來調八字立時痊疴效誠多疔瘡疔瘡神效豨蘞草五月五日午時討細末酒調半兩餘服訖汗出果然好蛇犬傷細辛蓽撥及雄黃用酒研來入麝香不問蛇傷並犬咬當時吃了便安康安胎紫蘇陳皮橘皮蔥細末砂仁煎酒同胎氣不安心下揍腹中脹痛有神功顛犬傷顛犬所傷人最苦雄黃五錢麝五錢酒調二錢作二服不服灌鼻亦安然止痛草果玄胡索最先靈脂沒藥乳香聯酒調一盞宜溫服腹痛心疼似手拈痔漏凡人痔漏痛成瘡遺種蠶蛾紙半張碗內燒灰調好酒服之去病水澆霜牙疼寒菊花兒五七團雪花同搗飯為丸搐入鼻中如棗大去疼真似手來拈接骨接骨誰知甚藥佳急須覓取大蝦蟆生搗如泥塗患處杉皮夾定甚堪誇解酒酒能醒酒不尋常草果加煎乾葛湯解毒頻頻三四盞醒前醉後並宜嘗忘事凡人日夜事多忘遠志菖蒲煮作湯每旦空心服一碗詩書如刻在心腸果毒世間果品甚多般性毒有無冷與寒誤食中傷何可解朴硝加麝即時安吃噫老幼忽然吃噫連川椒生面和為丸醋湯十粒梧桐大信是仙方不妄傳傷寒傷寒忽覺苦難醫半兩茱萸不用余用水煎來空腹服管教所患當時除頭空痛腦痛懸空在頂高急宜細碾馬牙硝好把酥來同搗合暫安鼻上自逍遙赤眼赤眼難開不見天宣州土産好黃連便將驢乳淹三宿點上光明即豁然翳眼眼中生翳莫能窺想是肝經蘊熱虛快取蘭香七個子煎湯一服病消除小兒瘧幼小孩兒抱瘧疾烏貓取糞最相宜桃仁七個同煎服病前一盞顯良醫咳嗽不止咳嗽多時如不止誰知只用好浮萍干時爛搗濃煎服一夜安眠直到明刀斧傷金瘡刀斧偶傷殘只用黃丹對白礬最好生肌兼止痛即時傷處見平安瘧疾常山搗末取三錢四個烏梅去核研瘧疾未來調酒服須臾得吐去痰涎惡癬瘡世上諸般惡毒瘡更兼疥癬有良方好將驢糞燒灰摻日見皮膚復得常足筋急痛兩腳筋疼拘急攣不分晝夜動移難快搗生薑膏子劑薄攤其上覆如前小便不下小便終朝難得下萵苣一味搗成泥將來作餅臍中貼能使泉流得應時蛔蟲寸白虛胃自然成節病多生寸白與蛔蟲蜂窩收採燒存性酒調一匕有神功乾溼癬頭面若生乾溼癬半生半炟與明礬酒調塗上登時愈管取皮膚日下痊翻胃病來翻胃幾多時乾柿三枚搗似泥好酒調開乘熱服此方效驗少人知血流不止血流不止是如何驢糞燒灰不用多但取些兒吹鼻內須知此病即消磨口臭如人口氣臭難當但取明礬共麝香兩件相交搽齒上言談呵笑不聞揚鼠咬鼠咬肉皮最不良毒攻疼痛腫難當急將貓糞填痕內端的公然不作瘡痔肛門痔病苦恓惶炒過胡荽子最良細碾酒調三五服自然動履得如常蜈蚣蛇蠍傷蜈蚣蛇蠍毒非常咬著人時痛莫當我有靈丹隨手好自然薑汁和雄黃消渴栝蔞根是天花粉消渴能令目下痊採得無時煎白水服之口內似生泉小便血小腸尿血不曾疏採取新鮮劉寄奴為末茶調空腹服便中赤色自然無胎衣不下灶中土是伏龍肝藥賤功殊不等閒為末酒調溫口服胎衣不下是靈丹倒生兒在腹中將倒生渾家驚恐計無從尋取伏龍肝末服酒調一劑便分生産後無乳婦人乳汁不行時萵苣三枚研作泥好酒調開通口服任他石女也淋漓産後咽乾産後咽喉又苦幹更兼咳嗽不能安豬脂胡粉同交和熟水調開服自痊陰中腫婦人忽患陰中腫蔥白研膏入乳香貼敷逾時休洗去原來海上有奇方陰瘡婦人陰內忽生瘡痛癢無時不可當尋取鯽魚將膽抹不逾時刻便清涼月信不調阿膠灰炒成珠顆乘熱將來即便研月信不調宜此末酒調一服應時痊産難鐵錘火煉透中紅淬酒乘溫飲一鍾專保婦人臨産難即時分娩喜相逢産後心痛産後婦人心氣痛叫聲切切手摩拈酒調雞子空心服一夜能教肅靜眠産後血不止婦人産後血難住諸藥無如百草霜為末酒調乘暖服明朝立馬見平康胎衣不下産後胎衣不落身惶惶驚動一家人萆麻去殼十四個白麵同研敷足心小兒驚風急驚風與漫驚風奪命方知有大功水磨但得青礞石調下痰涎主便通小兒喘嗽咳嗽小兒多氣喘石膏火內慢飛炟研為細末蜜湯調一夜分明減一半小兒夜啼小兒夜哭不能眠收拾燈花四五圓捻爛燈心湯化下一宵肅靜到明天小兒撮口撮口臍風總一般十兒難得兩三痊快覓殭蠶為細末蜜調塗向口中安小兒瀉痢瀉痢脫肛不用焦槐花為末米湯調食前一盞頻頻進效驗如同鼓應枹牙疼牙疼鶴蝨共甘松白芷細辛分兩同為末少將牙上擦煎湯灌漱自安寧孫真人枕上記侵晨一碗粥夜飯莫教足撞動景陽鍾扣齒三十六大寒與大熱且莫貪色欲醉飽莫行房五臟皆翻覆艾火漫燒身爭如獨自宿坐臥莫當風頻於暖處浴食飽行百步常以手摩腹莫食無鱗魚諸般禽獸肉自死獸與禽食之多命促土木為形象求之有恩福父精母血生那忍分南北惜命惜身人六白光如玉孫真人養生銘怒甚偏傷氣思多太損神神疲心易役氣弱病相侵勿被悲歡極當令飯食均再三防夜醉第一戒晨嗔亥寢鳴云鼓寅興漱玉津妖邪難犯己精氣自全身若要無諸病常當節五辛安神宜悅樂惜氣保和純壽夭休論命修行本在人若能遵此理平地可朝真
