front:
  text: 重刻海上方序孫真人海上方洞有舊石刻第以碑小方多字畫傷於瑣屑不便檢閲且舛訛太甚乃令生員謝沾細加訂正礱石大書舊有木刻病證列於目録詩首止列號數讀者須尋病於前而求方於後尤為不便茲將病證即列詩首似亦省目其他風藥論及九轉靈丹諸方洞前已有楷書大碑茲不復贅及之隆慶六年歲在壬申三月之吉秦王守中識
  hash: sha256:d989ae9fa343d7d2f71597903bc82ad13e0d93769fb0c73f0f184840944ccc9f
